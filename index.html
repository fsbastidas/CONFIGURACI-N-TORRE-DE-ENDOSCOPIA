<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba imagen</title>
  <style>
    #torre {
      width: 300px;
      min-height: 300px;
      border: 2px dashed gray;
      padding: 10px;
      margin-top: 20px;
    }

    .modulo {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <h1>Prueba de imagen</h1>

  <button onclick="setProcesador('EP-6000.png')">EP-6000</button>
  <button onclick="setProcesador('VP-7000.png')">VP-7000</button>
  <button onclick="setProcesador('EP-8000.png')">EP-8000</button>

  <div id="torre"></div>

  <script>
    function setProcesador(imgSrc) {
      const torre = document.getElementById("torre");
      torre.innerHTML = "";

      const img = document.createElement("img");
      img.src = imgSrc;
      img.className = "modulo";

      img.onload = function() {
        console.log("Imagen cargada:", imgSrc);
      };

      img.onerror = function() {
        console.log("No se encontró la imagen:", imgSrc);
        alert("No se encontró la imagen: " + imgSrc);
      };

      torre.appendChild(img);
    }
  </script>

</body>
</html>
