<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configurador Torre Endoscópica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Configurador Torre Endoscópica</h1>

  <div class="layout">

    <div class="panel">
      <h2>Fuente de luz / Procesadora</h2>
      <button onclick="setProcesador('EP-6000.png')">EP-6000</button>
      <button onclick="setProcesador('VP-7000.png')">VP-7000</button>
      <button onclick="setProcesador('EP-8000.png')">EP-8000</button>

      <h2>Periféricos</h2>
      <button onclick="addPeriferico('JW-3.png')">Bomba de irrigación JW-3</button>
      <button onclick="addPeriferico('GW-100.png')">Bomba de CO2 GW-100</button>
      <button onclick="addPeriferico('EX-1.png')">CadEye EX-1</button>
      <button onclick="addPeriferico('SU-1.png')">Procesadora ultrasonido SU-1</button>

      <h2>Tanques</h2>
      <button onclick="setTanque('WT-4.png')">Tanque de agua WT-4 / WT-603</button>
      <button onclick="setTanque('WT-04G.png')">Tanque de agua con CO2 WT-04G / WT-604G</button>

      <h2>Endoscopios</h2>
      <button onclick="setEndoscopio('SERIE-500.png')">Serie 500</button>
      <button onclick="setEndoscopio('SERIE-600.png')">Serie 600</button>
      <button onclick="setEndoscopio('SERIE-700.png')">Serie 700</button>

      <div class="acciones">
        <button onclick="limpiarTorre()">Limpiar torre</button>
      </div>
    </div>

    <div class="vista">
      <div class="titulo-vista">Vista previa de la torre</div>

      <div class="torre-wrap">
        <div class="torre">
          <div class="etiqueta-superior">COCHE</div>

          <div class="monitor-box">
            <div class="slot-label">MONITOR</div>
            <div id="monitorSlot" class="slot monitor-slot">
              <div class="placeholder">Monitor</div>
            </div>
          </div>

          <div class="rack-area">
            <div id="tanqueSlot" class="tanques">
            <div class="vertical-text">TANQUE</div>
            </div>
            
            <div class="rack-left">
              <div id="procesadorSlot" class="shelf shelf-grande">
                <div class="placeholder">FUENTE DE LUZ / PROCESADORA</div>
              </div>

              <div id="perifericoSlot1" class="shelf shelf-doble">
                <div class="doble-slot" id="per1a"><div class="placeholder small">PERIFÉRICO</div></div>
                <div class="doble-slot" id="per1b"><div class="placeholder small">PERIFÉRICO</div></div>
              </div>

              <div id="perifericoSlot2" class="shelf shelf-doble">
                <div class="doble-slot" id="per2a"><div class="placeholder small">PERIFÉRICO</div></div>
                <div class="doble-slot" id="per2b"><div class="placeholder small">PERIFÉRICO</div></div>
              </div>
            </div>

            <div id="endoscopioSlot" class="endoscopios">
              <div class="vertical-text">ENDOSCOPIOS</div>
            </div>
          </div>
        </div>
      </div>

      <div class="ayuda">
        Haz clic en un periférico ocupado para reemplazarlo.
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
