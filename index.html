<!DOCTYPE html>
<html>
<head>
  <title>Torre Endoscópica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Configurador de Torre Endoscópica</h1>

<div class="container">

  <!-- TORRE -->
  <div class="torre">

    <div id="monitor" class="bloque">MONITOR</div>

    <div id="procesador" class="bloque">FUENTE / PROCESADORA</div>

    <div id="perifericos" class="bloque">PERIFÉRICOS</div>

    <div id="perifericos2" class="bloque">PERIFÉRICOS</div>

  </div>

  <!-- PANEL -->
  <div class="panel">

    <h3>Fuente / Procesadora</h3>
    <button onclick="setProcesador('EP-6000')">EP-6000</button>
    <button onclick="setProcesador('VP-7000')">VP-7000</button>
    <button onclick="setProcesador('EP-8000')">EP-8000</button>

    <h3>Periféricos</h3>
    <button onclick="addPeriferico('JW-3')">Bomba Irrigación</button>
    <button onclick="addPeriferico('GW-100')">Bomba CO2</button>
    <button onclick="addPeriferico('EX-1')">CadEye</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
