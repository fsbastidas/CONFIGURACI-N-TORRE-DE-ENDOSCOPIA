<!DOCTYPE html>
<html>
<head>
  <title>Configurador Torre Endoscópica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Configurador de Torre Endoscópica</h1>

<div class="container">

  <!-- TORRE -->
  <div id="torre"></div>

  <!-- PANEL -->
  <div class="panel">

    <h3>Procesadora</h3>
    <button onclick="setProcesador('EP-6000.png')">EP-6000</button>
    <button onclick="setProcesador('VP-7000.png')">VP-7000</button>

    <h3>Periféricos</h3>
    <button onclick="addEquipo('jw3.png')">Bomba JW-3</button>
    <button onclick="addEquipo('gw100.png')">CO2 GW-100</button>
    <button onclick="addEquipo('cadeye.png')">CadEye</button>

    <h3>Acciones</h3>
    <button onclick="limpiarTorre()">Limpiar torre</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
